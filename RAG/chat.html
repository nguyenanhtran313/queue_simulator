<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG queue_simulator — Chat</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #8b93a3;
    --accent: #5b8cff;
    --user-bubble: #5b8cff;
    --bot-bubble: #1f2430;
    --ok: #3ecf8e;
    --warn: #f2b84b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }
  .controls button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .controls button:hover { color: var(--text); border-color: var(--accent); }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 14px;
  }
  .msg.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
  }
  .badge.grounded { background: rgba(62,207,142,0.15); color: var(--ok); }
  .badge.not-grounded { background: rgba(242,184,75,0.15); color: var(--warn); }
  .sources { margin-top: 6px; font-size: 12px; color: var(--muted); }
  .sources ul { margin: 4px 0 0; padding-left: 16px; }
  .sources a { color: var(--accent); text-decoration: none; }
  .sources a:hover { text-decoration: underline; }
  #inputBar {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  #inputBar textarea {
    flex: 1;
    resize: none;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    height: 44px;
  }
  #inputBar button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
  }
  #inputBar button:disabled { opacity: 0.5; cursor: default; }
  .loading { color: var(--muted); font-size: 13px; font-style: italic; }
</style>
</head>
<body>

<header>
  <div>
    <h1>RAG queue_simulator</h1>
    <div class="sub">Hỏi đáp về các dự án con trong repo — grounded trên corpus, có trích dẫn nguồn</div>
  </div>
  <div class="controls">
    <input id="apiBase" type="text" value="http://localhost:8000" size="24" title="API base URL">
    <input id="sourceFilter" type="text" placeholder="lọc nguồn (vd: dinhgia_bds)" size="20">
    <button id="resetBtn" title="Xoá lịch sử hội thoại, bắt đầu phiên mới">Cuộc trò chuyện mới</button>
  </div>
</header>

<div id="chat"></div>

<div id="inputBar">
  <textarea id="questionInput" placeholder="Nhập câu hỏi... (Enter để gửi, Shift+Enter xuống dòng)"></textarea>
  <button id="sendBtn">Gửi</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const apiBaseInput = document.getElementById('apiBase');
const sourceFilterInput = document.getElementById('sourceFilter');
const resetBtn = document.getElementById('resetBtn');

let sessionId = crypto.randomUUID();

function addMessage(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderBotAnswer(result) {
  let html = escapeHtml(result.answer);
  html += result.grounded
    ? '<div class="badge grounded">grounded</div>'
    : '<div class="badge not-grounded">không tìm thấy trong corpus</div>';
  if (result.sources && result.sources.length) {
    html += '<div class="sources">Nguồn:<ul>' + result.sources.map(s => {
      const label = escapeHtml(s.title) + ' — ' + escapeHtml(s.section);
      return '<li>' + (s.url ? `<a href="#" title="${escapeHtml(s.url)}">${label}</a>` : label) + '</li>';
    }).join('') + '</ul></div>';
  }
  return html;
}

async function sendQuestion() {
  const question = questionInput.value.trim();
  if (!question) return;

  addMessage('user', escapeHtml(question));
  questionInput.value = '';
  sendBtn.disabled = true;
  const loadingBubble = addMessage('bot', '<span class="loading">Đang tra cứu...</span>');

  const sourceFilterRaw = sourceFilterInput.value.trim();
  const body = {
    question,
    session_id: sessionId,
  };
  if (sourceFilterRaw) {
    body.source_filter = sourceFilterRaw.split(',').map(s => s.trim()).filter(Boolean);
  }

  try {
    const resp = await fetch(apiBaseInput.value.replace(/\/$/, '') + '/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      loadingBubble.innerHTML = 'Lỗi: ' + escapeHtml(err.detail || resp.statusText);
      return;
    }
    const result = await resp.json();
    loadingBubble.innerHTML = renderBotAnswer(result);
  } catch (e) {
    loadingBubble.innerHTML = 'Không gọi được API (' + escapeHtml(apiBaseInput.value) + '). Kiểm tra server đã chạy `uvicorn api:app` chưa, hoặc CORS. Chi tiết: ' + escapeHtml(String(e));
  } finally {
    sendBtn.disabled = false;
    questionInput.focus();
  }
}

sendBtn.addEventListener('click', sendQuestion);
questionInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
});

resetBtn.addEventListener('click', async () => {
  try {
    await fetch(apiBaseInput.value.replace(/\/$/, '') + '/session/' + sessionId + '/reset', { method: 'POST' });
  } catch (e) { /* server có thể chưa chạy — vẫn cho phép bắt đầu phiên mới ở client */ }
  sessionId = crypto.randomUUID();
  chatEl.innerHTML = '';
});
</script>

</body>
</html>
