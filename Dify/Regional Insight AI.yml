          \    \"gmv_d1\": \"Total GMV of yesterday (gmv day-1)\",\n        \"gmv_d7\"\
          : \"Total GMV of sameday last week (gmv day-7)\",\n        \"%dod_gmv\"\
          : \"Percentage change between gmv_rr_today and gmv_d1 (gmv_rr_today/gmv_d1)\"\
