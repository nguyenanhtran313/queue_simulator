          \ and gmv_fc (gmv_rr_today - gmv_fc)\",\n        \"%gmv_on_fc\": \"Percentage\
          \ of gmv_rr_today on gmv_fc (gmv_rr_today/gmv_fc)\",\n        \n       \
          \ \"pavlc_rr_today\": \"Estimate total PAVLC wholeday today\",\n       \
          \ \"pavlc_d1\": \"Total PAVLC of yesterday (pavlc day-1)\",\n        \"\
          pavlc_d7\": \"Total PAVLC of sameday last week (pavlc day-7)\",\n      \
          \  \"%dod_pavlc\": \"Percentage change between pavlc_rr_today and pavlc_d1\
          \ (pavlc_rr_today/pavlc_d1)\",\n        \"%wow_pavlc_by_day\": \"Percentage\
          \ change between pavlc_rr_today and pavlc_d7 (pavlc_rr_today/pavlc_d7)\"\
          ,\n        \"pavlc_fc\": \"Total PAVLC forecast of wholeday today\",\n \
          \       \"gap_pavlc_fc\": \"Difference between pavlc_rr_today and pavlc_fc\
          \ (pavlc_rr_today - pavlc_fc)\",\n        \"%pavlc_on_fc\": \"Percentage\
          \ of pavlc_rr_today on pavlc_fc (pavlc_rr_today/pavlc_fc)\",\n        \n\
          \        \"gta_rr_today\": \"Estimate total GTA wholeday today\",\n    \
          \    \"gta_d1\": \"Total GTA of yesterday (GTA day-1)\",\n        \"gta_d7\"\
          : \"Total GTA of sameday last week (GTA day-7)\",\n        \"%dod_gta\"\
          : \"Percentage change between gta_rr_today and gta_d1 (gta_rr_today/gta_d1)\"\
          ,\n        \"%wow_gta_by_day\": \"Percentage change between gta_rr_today\
          \ and gta_d7 (gta_rr_today/gta_d7)\",\n        \"gta_fc\": \"Total GTA forecast\
          \ of wholeday today\",\n        \"gap_gta_fc\": \"Difference between gta_rr_today\
          \ and gta_fc (gta_rr_today - gta_fc)\",\n        \"%gta_on_fc\": \"Percentage\
          \ of gta_rr_today on gta_fc (gta_rr_today/gta_fc)\",\n    }\n    \"\"\"\n\
          \    return {\n        \"metric_definition\": metric_definition,\n     \
          \   \"current_time\": current_time,\n        \"current_date\": current_date\n\
          \    }"
