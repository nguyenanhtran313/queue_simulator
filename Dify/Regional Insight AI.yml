          ,\n        \"sales_channel\": \"Channel route to market of products sold\"\
          ,\n        \"sub_province_name\": \"Provinces for business operation\",\n\
          \        \"brand_name\": \"Brands of products sold\",\n\n        \"GMV\"\
          : \"Gross Merchandize Value\",\n        \"PAVLC\": \"Profit after Variable\
