    - data:
        code: "from datetime import datetime\nimport json\n\ndef main(body: str) ->\
          \ dict:\n    body = json.loads(body)\n    rows = body[\"rows\"]\n\n    ###\
          \ Latest Order Created ###\n    list_time = [r.get(\"latest_order_created_time\"\
          ) for r in rows if r.get(\"latest_order_created_time\")]\n    latest_order_at\
          \ = max(list_time) if list_time else None\n    latest_order_date = datetime.strptime(latest_order_at,\
          \ \"%Y-%m-%d %H:%M:%S\").strftime(\"%Y-%m-%d\")\n\n    ### Total ###\n \
          \   rows_total = [r for r in rows if r.get(\"datagroup\") == \"Total\"]\n\
          \    cols_total = [\n        \"geo_region_ops\",\n        \"gmv_rr_today\"\
          , \"%dod_gmv\", \"%wow_gmv_by_day\", \"%gmv_on_fc\",\n        \"pavlc_rr_today\"\
          , \"%dod_pavlc\", \"%wow_pavlc_by_day\", \"%pavlc_on_fc\"\n    ]\n    data_region_total\
          \ = [{col: r.get(col) for col in cols_total} for r in rows_total]\n    data_region_total\
          \ = json.dumps(data_region_total, ensure_ascii=False)\n\n    ### Region\
          \ detail ###\n    rows_region_detail = [r for r in rows if r.get(\"datagroup\"\
          ) == \"Region\"]\n    cols_region_detail = [\n        \"geo_region_ops\"\
          , \"sales_channel\", \"sub_province_name\", \"brand_name\",\n        \"\
          gmv_rr_today\", \"%dod_gmv\", \"%wow_gmv_by_day\", \"%gmv_on_fc\",\n   \
          \     \"pavlc_rr_today\", \"%dod_pavlc\", \"%wow_pavlc_by_day\", \"%pavlc_on_fc\"\
          \n    ]\n    data_region_detail = [{col: r.get(col) for col in cols_region_detail}\
          \ for r in rows_region_detail]\n    data_region_detail = json.dumps(data_region_detail,\
          \ ensure_ascii=False)\n\n    ### MES detail ###\n    rows_mes_detail = [r\
          \ for r in rows if r.get(\"datagroup\") == \"MES\"]\n    cols_mes_detail\
          \ = [\n        \"geo_region_ops\", \"sub_province_name\", \"brand_name\"\
          ,\n        \"gmv_rr_today\", \"%dod_gmv\", \"%wow_gmv_by_day\", \"%gmv_on_fc\"\
          ,\n        \"pavlc_rr_today\", \"%dod_pavlc\", \"%wow_pavlc_by_day\", \"\
          %pavlc_on_fc\"\n    ]\n    data_mes_detail = [{col: r.get(col) for col in\
          \ cols_mes_detail} for r in rows_mes_detail]\n    data_mes_detail = json.dumps(data_mes_detail,\
          \ ensure_ascii=False)\n\n    ### Log Data Input ###\n    log_data = data_region_total.replace('\"\
          ',\"\").replace(\"}, {\",\"\\n\").replace(\"[{\",\"\").replace(\"}]\",\"\
          \")\n    log_data = f\"\"\"LOG:\\n```{log_data}```\"\"\"\n\n    return {\n\
          \        \"latest_order_at\": latest_order_at,\n        \"latest_order_date\"\
          : latest_order_date,\n        \"data_region_total\": data_region_total,\n\
          \        \"data_region_detail\": data_region_detail,\n        \"data_mes_detail\"\
          : data_mes_detail,\n        \"log_data\": log_data,\n    }"
