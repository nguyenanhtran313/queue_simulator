    - data:
        code: "from datetime import datetime\nimport random\nimport re\n\ndef main(insight_text:\
          \ str, latest_order_at: str, current_time: str) -> dict:\n    ### Header\
          \ Format ###\n    current_time = datetime.strptime(current_time, \"%Y-%m-%d\
          \ %H:%M:%S\")\n    current_date = current_time.date()\n    current_hour\
          \ = current_time.hour\n\n    latest_order_at = datetime.strptime(latest_order_at,\
          \ \"%Y-%m-%d %H:%M:%S\")\n    latest_order_date = latest_order_at.date()\n\
          \    latest_order_date_f = datetime.strftime(latest_order_at, \"%-d/%-m\"\
          )\n\n    if current_date > latest_order_date:\n        list_greetings =\
          \ [\"Ace cùng Oneshop nhìn lại performance hôm qua nhé!\"]\n    elif current_hour\
          \ < 17:\n        list_greetings = [\"Ace đã nghỉ ngơi sẵn sàng cho buổi\
          \ chiều năng suất chưa ạ?\", \"Ace cùng check qua số sáng nay nhé!\"]\n\
          \    else:\n        list_greetings = [\"Chào buổi chiều tốt lành!\"]\n \
          \   greeting_text = random.choice(list_greetings)\n    header_text = f\"\
          \U0001F30F Báo cáo ngày {latest_order_date_f}\\n{greeting_text}\"\n\n  \
          \  tt_summary = \"\U0001F4AC Nhận xét chung:\"\n    tt_north = \"\U0001F3D4\
          ️ Miền Bắc:\"\n    tt_south = \"\U0001F334 Miền Nam:\"\n\n    pattern_summary\
          \ = rf\"{tt_summary}(.*?){re.escape(tt_north)}\"\n    sect_summary = re.search(pattern_summary,\
          \ insight_text, re.S).group(1).rstrip()\n    sect_summary_north = re.search(r\"\
          (-\\s+Miền Bắc.*?\\.)\", sect_summary, re.S).group(1).rstrip()\n    sect_summary_north\
          \ = \"\\n\".join([tt_summary, sect_summary_north])\n    sect_summary_south\
          \ = re.search(r\"(-\\s+Miền Nam.*?\\.)\", sect_summary, re.S).group(1).rstrip()\n\
          \    sect_summary_south = \"\\n\".join([tt_summary, sect_summary_south])\n\
          \n    pattern_detail_north = rf\"({tt_north}.*?){re.escape(tt_south)}\"\n\
          \    sect_detail_north = re.search(pattern_detail_north, insight_text, re.S).group(1).rstrip()\n\
          \n    pattern_detail_south = rf\"({tt_south}.*?)$\"\n    sect_detail_south\
          \ = re.search(pattern_detail_south, insight_text, re.S).group(1).rstrip()\n\
