        prompt_template:
        - id: cf8048c5-cb26-4a54-bd6c-20a478aaa495
          role: system
          text: "\U0001F3AF **ROLE**\nBạn là một chuyên gia Data Architect cao cấp.\
            \ Nhiệm vụ của bạn là phân tích yêu cầu của người dùng, lập kế hoạch truy\
            \ xuất dữ liệu bằng cách chọn các bảng FACT/DIM phù hợp và định nghĩa\
            \ logic tính toán chỉ số (metrics) để đảm bảo tính chính xác tuyệt đối.\n\
            \n\U0001F6E0 **LOGIC XỬ LÝ CHI TIẾT**\n1. **Phân tích thực thể**: Xác\
            \ định các Metrics (chỉ số cần tính) và Dimensions (chiều phân loại, lọc)\
            \ từ câu hỏi.\n2. **Lập bản đồ Metric (Metric Mapping)**: \n   - Với mỗi\
            \ Metric, tìm bảng FACT phù hợp nhất chứa dữ liệu gốc. \n   - Xác định\
            \ chính xác tên cột và hàm tổng hợp (SUM, COUNT,...) cần dùng.\n   - **QUAN\
            \ TRỌNG**: Nếu một Metric có thể hiểu theo nhiều cách hoặc xuất hiện ở\
            \ nhiều bảng, hãy chọn bảng chuyên biệt nhất.\n   - Phân rã Công thức\
            \ (Formula Decomposition): Nếu Metric nằm trong danh sách formulas của\
            \ Metadata: BẮT BUỘC phân rã và liệt kê tất cả các cột thành phần cấu\
            \ thành nên công thức đó vào danh sách columns của JSON.\n3. **Trích xuất\
            \ Cột & Quan hệ**:\n   - Liệt kê các cột liên quan đến Metrics, Dimensions.\n\
            \   - BẮT BUỘC liệt kê tất cả các cột khóa (PK, FK) để phục vụ việc JOIN.\n\
            4. **Xác định Exploration Mode**:\n   - \"strict\": Khi xác định được\
            \ chính xác bảng DIM chứa Dimension yêu cầu trong Context.\n   - \"expand\"\
            : Khi Dimension mập mờ hoặc không thấy cột Dimension trực tiếp trong các\
            \ bảng đã chọn (cần hệ thống tự động truy vết thêm).\n\n\U0001F4CB **QUY\
            \ TẮC HIỂN THỊ CỘT LỌC (CONTEXTUAL FILTER)**\nNếu cột có ghi chú \"Lưu\
            \ ý người dùng cần filter phù hợp ngữ cảnh\":\n- Trả ra đoạn lưu ý Markdown\
            \ phía trên khối SQL (nếu có output text).\n- Cấu trúc: * **Bảng <tên_bảng>**\
            \ -> * **<tên_cột>** : <Mô tả>.\n\n\U0001F4E4 **OUTPUT FORMAT**\nChỉ trả\
            \ về duy nhất định dạng JSON theo Schema yêu cầu. Không giải thích thêm.\n\
            \n\U0001F6AB **QUY TẮC CẤM**\n- KHÔNG tự ý gộp nhiều cột thành một chỉ\
            \ số nếu Metadata đã cung cấp một cột chuyên biệt.\n- KHÔNG trả về văn\
            \ bản ngoài khối JSON.\n- `reason` và `summary_reason` viết tối đa 2 câu."
        - id: c97d1109-b88e-4166-b905-4f33f116e934
          role: user
          text: 'Dựa trên danh sách các bảng trong {{#context#}} hãy thực hiện yêu
            cầu:


            ### Câu hỏi gốc:

            {{#sys.query#}}


            Hãy phân tích và trả ra JSON kết quả chính xác theo Schema.'
        selected: false
        structured_output:
          schema:
            properties:
              exploration_mode:
                description: Chọn 'strict' nếu đủ bảng DIM. Chọn 'expand' nếu cần
                  truy vết thêm Dimension ẩn.
                enum:
                - strict
                - expand
                type: string
              metric_logic:
                description: 'BẮT BUỘC: Định nghĩa logic tính toán cho từng chỉ số
                  để LLM sau không tính sai.'
                items:
                  properties:
                    aggregation:
                      description: 'Hàm tổng hợp: SUM, COUNT, DISTINCT_COUNT, v.v.'
                      type: string
                    column_expression:
                      description: 'Tên cột hoặc biểu thức tính toán (ví dụ: sponsor_appliedvalue).'
                      type: string
                    metric_name:
                      description: 'Tên chỉ số (ví dụ: Promotion Cost).'
                      type: string
                    source_table:
                      description: Bảng chứa dữ liệu gốc cho chỉ số này.
                      type: string
                  required:
                  - metric_name
                  - source_table
                  - column_expression
                  - aggregation
                  type: object
                type: array
              relationships:
                items:
                  properties:
                    is_dim_relation:
                      description: true/false
                      type: string
                    join_on:
                      type: string
                    source_table:
                      type: string
                    target_table:
                      type: string
                  required:
                  - source_table
                  - target_table
                  - join_on
                  - is_dim_relation
                  type: object
                type: array
              selected_facts:
                items:
                  properties:
                    reason:
                      description: Lý do chọn bảng.
                      type: string
                    relevant_columns:
                      description: Cột chỉ số, dimension và PK/FK.
                      items:
                        type: string
                      type: array
                    table_name:
                      description: Tên đầy đủ của bảng.
                      type: string
                  required:
                  - table_name
                  - relevant_columns
                  - reason
                  type: object
                type: array
              summary_reason:
                type: string
            required:
            - exploration_mode
