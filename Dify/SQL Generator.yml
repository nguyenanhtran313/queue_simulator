          \ seen = set()\n\n    for item in combined:\n        t, c, tp = item.get('table'),\
          \ item.get('column'), item.get('type')\n        if t and c:\n          \
          \  # Tạo key để distinct cặp table-column\n            key = (t, c)\n  \
          \          if key not in seen:\n                seen.add(key)\n        \
          \        unique_check_list.append(item)\n            \n            # Gom\
