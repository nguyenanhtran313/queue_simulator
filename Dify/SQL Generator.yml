    - data:
        code: "import json\nimport re\n\ndef main(iteration_results: list) -> dict:\n\
          \    all_content = []\n\n    # 1. Trích xuất text thô\n    def extract_text(data):\n\
          \        if isinstance(data, list):\n            for item in data: extract_text(item)\n\
          \        elif isinstance(data, dict):\n            content = data.get('content')\
          \ or data.get('text') or data.get('output')\n            if content: all_content.append(str(content))\n\
          \    \n    extract_text(iteration_results)\n    \n    merged_tables = {}\n\
          \n    for raw_text in all_content:\n        # Chuẩn hóa các ký tự escape\
          \ để đếm dấu ngoặc kép chính xác\n        # Biến \\\" thành \" để xử lý\
          \ đồng nhất\n        text = raw_text.replace('\\\\\"', '\"')\n        \n\
          \        # Tìm dấu { đầu tiên (điểm bắt đầu của bảng)\n        first_brace\
          \ = text.find('{')\n        if first_brace == -1: continue\n        \n \
          \       # Lấy phần header trước dấu {\n        header = text[:first_brace]\n\
          \        \n        # Bóc tên bảng: Ký tự giữa hai dấu \" cuối cùng trước\
          \ dấu {\n        quote_indices = [i for i, char in enumerate(header) if\
          \ char == '\"']\n        if len(quote_indices) < 2: continue\n        \n\
          \        table_name = header[quote_indices[-2] + 1 : quote_indices[-1]]\n\
          \        \n        if table_name not in merged_tables:\n            merged_tables[table_name]\
          \ = {\n                \"type\": \"fact\",\n                \"description\"\
          : \"\",\n                \"columns\": [],\n                \"conditions\"\
          : [],\n                \"relationships\": [],\n                \"formulas\"\
          : []\n            }\n        \n        target = merged_tables[table_name]\n\
          \n        # 2. Logic bóc tách dữ liệu tổng quát (Không dùng json.loads)\n\
          \        # Tìm và Union các mảng: columns, conditions, relationships, formulas\n\
          \        for key in [\"columns\", \"conditions\", \"relationships\", \"\
          formulas\"]:\n            # Regex tìm khối \"key\": [ ... ] kể cả khi bị\
          \ cắt nát\n            # Tìm nội dung bên trong dấu ngoặc vuông sau tên\
          \ key\n            list_pattern = rf'\"{key}\"\\s*:\\s*\\[(.*?)\\]'\n  \
          \          list_matches = re.findall(list_pattern, text, re.DOTALL)\n  \
          \          \n            for block in list_matches:\n                # Bóc\
          \ từng phần tử nằm trong ngoặc kép \"item\"\n                # Handle cả\
          \ trường hợp có dấu ngoặc kép lồng nhau bên trong\n                items\
          \ = re.findall(r'\"((?:[^\"\\\\]|\\\\.)*)\"', block)\n                for\
          \ it in items:\n                    val = it.strip().replace('\\\\\"', '\"\
          ')\n                    if val and val not in target[key]:\n           \
          \             target[key].append(val)\n\n        # Bóc description và type\
          \ (nếu target chưa có)\n        if not target[\"description\"]:\n      \
          \      desc_match = re.search(r'\"description\"\\s*:\\s*\"((?:[^\"\\\\]|\\\
          \\.)*)\"', text)\n            if desc_match: target[\"description\"] = desc_match.group(1).replace('\\\
          \\\"', '\"')\n            \n        if not target[\"type\"]:\n         \
          \   type_match = re.search(r'\"type\"\\s*:\\s*\"((?:[^\"\\\\]|\\\\.)*)\"\
          ', text)\n            if type_match: target[\"type\"] = type_match.group(1)\n\
          \n    # 3. Gom lại thành kết quả cuối cùng\n    final_list = []\n    for\
          \ t_name, t_data in merged_tables.items():\n        # Chỉ giữ lại các key\
          \ có dữ liệu để giảm Token cho BOT\n        clean_entry = {k: v for k, v\
          \ in t_data.items() if v}\n        final_list.append(json.dumps({t_name:\
          \ clean_entry}, ensure_ascii=False, indent=2))\n\n    return {\n       \
          \ \"final_list\": final_list,\n        \"count\": len(final_list)\n    }"
        code_language: python3
        desc: ''
        outputs:
          count:
            children: null
            type: number
          final_list:
            children: null
            type: array[string]
