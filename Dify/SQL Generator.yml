    - data:
        code: "import json\nimport re\n\ndef main(check_list, knowledge_raw, knowledge_definitions)\
          \ -> dict:\n    try:\n        if isinstance(knowledge_definitions, str)\
          \ and knowledge_definitions.strip():\n            definitions_dict = json.loads(knowledge_definitions)\n\
          \        elif isinstance(knowledge_definitions, dict):\n            definitions_dict\
          \ = knowledge_definitions\n        else:\n            definitions_dict =\
          \ {}\n\n        if \"data\" in definitions_dict:\n            definitions_dict\
          \ = definitions_dict[\"data\"]\n\n        if isinstance(check_list, str)\
          \ and check_list.strip():\n            target_list = json.loads(check_list)\n\
          \        else:\n            target_list = check_list if isinstance(check_list,\
          \ list) else []\n\n    except Exception as e:\n        return {\"organized_json\"\
          : f\"-- Lỗi Parse dữ liệu: {str(e)}\"}\n\n    # 2. Xây dựng col_map chỉ\
          \ lấy phần Definition sau dấu |\n    col_map = {}\n    for table_name, table_info\
          \ in definitions_dict.items():\n        if isinstance(table_info, dict)\
          \ and \"columns\" in table_info:\n            col_map[table_name] = {}\n\
          \            for col_entry in table_info[\"columns\"]:\n               \
          \ if \":\" in col_entry:\n                    c_name, c_rest = col_entry.split(\"\
          :\", 1)\n                    c_name = c_name.strip()\n                 \
          \   \n                    # CHỈ LẤY PHẦN ĐỊNH NGHĨA PHÍA SAU DẤU \"|\"\n\
          \                    if '|' in c_rest:\n                        definition\
          \ = c_rest.split('|')[1].strip()\n                    else:\n          \
          \              definition = c_rest.strip()\n                    \n     \
          \               # XÓA BỎ GHI CHÚ TRONG NGOẶC ĐƠN CHÍNH XÁC HƠN\n       \
          \             definition = re.sub(r'\\(.*?\\)', '', definition).strip()\n\
          \                    definition = definition.replace('\\n', ' ').strip()\n\
          \                    \n                    col_map[table_name][c_name] =\
          \ definition\n\n    table_meta = {}\n    for table_name, table_info in definitions_dict.items():\n\
          \        if isinstance(table_info, dict):\n            table_meta[table_name]\
          \ = {\n                \"description\": table_info.get(\"description\",\
          \ \"Dữ liệu metadata từ hệ thống\"),\n                \"type\": table_info.get(\"\
          type\", \"FACT\").upper()\n            }\n\n    targets = {}\n    for item\
          \ in target_list:\n        t_name = item.get('table')\n        c_name =\
          \ item.get('column')\n        if t_name and c_name:\n            if t_name\
          \ not in targets:\n                targets[t_name] = {}\n            targets[t_name][c_name]\
          \ = item.get('type', 'Check giá trị User')\n\n    extracted_data = {}\n\
          \    raw_list = knowledge_raw if isinstance(knowledge_raw, list) else []\n\
          \    \n    for chunk in raw_list:\n        content = chunk.get('content',\
          \ '')\n        matches = re.finditer(r'\"([^\"]+)\":\\s*\\{.*?\\\"values\\\
          \":\\s*\\[(.*?)\\]', content, re.DOTALL)\n        for m in matches:\n  \
          \          t_name = m.group(1)\n            if t_name in targets:\n    \
          \            if t_name not in extracted_data: \n                    extracted_data[t_name]\
          \ = []\n                \n                val_content = m.group(2)\n   \
          \             v_lines = re.findall(r'\"([^\"]+?):\\s*(.*?)\"', val_content)\n\
          \                \n                for c_name, vals in v_lines:\n      \
          \              c_name = c_name.strip()\n                    if c_name in\
          \ targets[t_name]:\n                        final_def = col_map.get(t_name,\
          \ {}).get(c_name, \"N/A\")\n                        \n                 \
          \       extracted_data[t_name].append({\n                            \"\
          column\": c_name,\n                            \"definition\": final_def,\n\
          \                            \"type\": targets[t_name][c_name],\n      \
          \                      \"values\": vals.strip()\n                      \
          \  })\n\n    output = [\"# METADATA HƯỚNG DẪN FILTER DỮ LIỆU\\n\"]\n   \
          \ \n    strict_block = definitions_dict.get(\"strict_logic_block\")\n  \
          \  if strict_block: \n        output.append(strict_block + \"\\n---\")\n\
          \n    for t_name in targets.keys():\n        if t_name not in extracted_data\
          \ and t_name not in col_map:\n            continue\n            \n     \
          \   output.append(f\"## TABLE: {t_name}\")\n        meta = table_meta.get(t_name,\
          \ {})\n        t_desc = meta.get(\"description\", \"Dữ liệu metadata từ\
          \ hệ thống\")\n        t_type = meta.get(\"type\", \"FACT\")\n        output.append(f\"\
          **Type**: {t_type} | **Description**: {t_desc}\\n\")\n        \n       \
          \ has_content = False\n        columns = extracted_data.get(t_name, [])\n\
          \        \n        for section_type, section_title, section_emoji in [\n\
          \            ('Check giá trị User', 'CÁC CỘT CẦN CHECK VỚI GIÁ TRỊ USER',\
          \ '\U0001F50D'),\n            ('Lưu ý từ định nghĩa', 'CÁC CỘT CẦN LƯU Ý',\
          \ '\U0001F6A9')\n        ]:\n            cols = [c for c in columns if c['type']\
          \ == section_type]\n            if cols:\n                has_content =\
          \ True\n                output.append(f\"### {section_emoji} {section_title}\"\
          )\n                for c in cols:\n                    label = \"Giá trị\
          \ hiện có\" if any(x in t_name.lower() for x in [\"sale\", \"gt\", \"fact\"\
          ]) else \"Dữ liệu mẫu\"\n                    output.append(f\"- **{c['column']}\
          \ ({c['definition']})** | {label}: ({c['values']})\")\n                output.append(\"\
          \")\n        \n        if not has_content:\n            output.append(\"\
          *Không có cột yêu cầu check đặc biệt.*\\n\")\n            \n        output.append(\"\
          ---\\n\")\n\n    return {\"organized_json\": \"\\n\".join(output)}"
