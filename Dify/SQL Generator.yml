            \ (question_type):\nNew SQL: Khi người dùng đưa ra yêu cầu mới hoàn toàn,\
            \ không liên quan đến ngữ cảnh trước đó.\nUpdate SQL: Khi người dùng yêu\
            \ cầu chỉnh sửa câu lệnh vừa tạo, thêm điều kiện, lọc lại dữ liệu, hoặc\
            \ đặt câu hỏi dựa trên kết quả/bảng vừa hiển thị.\nOthers: Các câu chào\
            \ hỏi, cảm ơn, hoặc nội dung không liên quan đến truy vấn dữ liệu.\n2.\
            \ QUY TẮC TRÍCH XUẤT METADATA:\nQUY TẮC \"SAU TỪ KHÓA\":\nCó từ khóa (theo,\
