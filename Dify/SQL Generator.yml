          \               if warning not in join_level_warnings:\n               \
          \                 join_level_warnings.append(warning)\n                \
          \    except:\n                        continue\n\n        strict_logic_lines.extend(join_level_warnings)\n\
          \        if len(join_level_warnings) == 0:\n            strict_logic_block\
          \ = \"## \U0001F4CC REQUIRED JOIN LOGIC (STRICT)\\n- Không có quy tắc join\
          \ đặc biệt.\"\n        else:\n            strict_logic_block = \"\\n\".join(strict_logic_lines)\n\
          \n        # Chuyển đổi sang chuỗi phân dòng\n        if unique_relationships_set:\n\
          \            unique_relationships_str = \"\\n\".join(sorted(list(unique_relationships_set)))\n\
          \        else:\n            unique_relationships_str = \"Không phát hiện\
          \ quan hệ nào.\"\n\n        # 7. Build Final result (Metadata Details)\n\
          \        output_result = [f\"# METADATA (MODE: {exploration_mode.upper()})\\\
          n\"]\n        output_result.append(\"## \U0001F4CC REQUIRED METRIC LOGIC\
          \ (STRICT)\")\n        for m in llm_metrics:\n            output_result.append(f\"\
          - **{m['metric_name']}**: `{m['aggregation']}({m['column_expression']})`\
          \ from `{m['source_table']}`\")\n        \n        output_result.append(\"\
          \\n---\\n\")\n\n        for path in relevant_full_paths.keys():\n      \
          \      table_info = relevant_full_paths[path]\n            table_type =\
          \ str(table_info.get('type', 'DIM')).upper()\n            output_result.append(f\"\
          ### TABLE: {path}\")\n            output_result.append(f\"**Type**: {table_type}\
          \ | **Description**: {str(table_info.get('description', ''))}\")\n     \
          \       \n            if table_info.get('conditions'):\n               \
          \ output_result.append(\"**Conditions (Bat buoc)**:\")\n               \
          \ for cond in table_info['conditions']: output_result.append(f\"  - {cond}\"\
          )\n            \n            all_cols = table_info.get('columns', [])\n\
          \            if table_type == 'DIM':\n                final_cols_to_show\
          \ = all_cols\n                output_result.append(\"Columns (Full - DIM\
          \ table):\")\n            else:\n                req_cols = required_cols_map.get(path,\
          \ set())\n                filtered_cols = [\n                    c for c\
          \ in all_cols \n                    if c.split(':')[0].strip().lower() in\
          \ req_cols \n                    or any(key in c.lower() for key in ['pk',\
          \ 'code', 'time', 'partition', 'date'])\n                ]\n           \
          \     final_cols_to_show = filtered_cols if filtered_cols else all_cols\n\
          \                output_result.append(\"Columns (Strict - FACT table):\"\
          )\n            \n            for c in final_cols_to_show: output_result.append(f\"\
          \  - {c}\")\n\n            output_result.append(\"Relationships:\")\n  \
          \          final_rels = []\n            for r in table_info.get('relationships',\
          \ []):\n                if \"ghi chú: lưu ý\" in r.lower():\n          \
          \          try:\n                        join_def = r.split(\"|\")[0].strip()\n\
          \                        source_col = join_def.split(\"->\")[0].strip()\n\
          \                        target_full_path_with_col = join_def.split(\"->\"\
          )[1].strip()\n                        parts = target_full_path_with_col.split(\"\
          .\")\n                        target_col = parts[-1]\n                 \
          \       target_table_full_path = \".\".join(parts[:-1])\n              \
          \          target_table_name = parts[-2]\n                        \n   \
          \                     enhanced_rel = (\n                            f\"\
          {source_col} -> Cần phải quy bảng {target_table_name} về level {target_col}\
          \ (GROUP BY) trước khi thực hiện JOIN để tránh duplicate số liệu.\\n\"\n\
          \                            f\"    \U0001F449 Hướng dẫn SQL mẫu: \\n\"\n\
          \                            f\"    ```sql\\n\"\n                      \
          \      f\"    SELECT ... FROM {path} a \\n\"\n                         \
          \   f\"    LEFT JOIN (SELECT {target_col}, [metric_columns] FROM {target_table_full_path}\
          \ GROUP BY {target_col}) b \\n\"\n                            f\"    ON\
          \ a.{source_col} = b.{target_col}\\n\"\n                            f\"\
          \    ```\"\n                        )\n                        final_rels.append(enhanced_rel)\n\
          \                    except:\n                        final_rels.append(r)\n\
          \                else:\n                    final_rels.append(r)\n     \
          \       \n            seen_rels = set()\n            for r in final_rels:\n\
