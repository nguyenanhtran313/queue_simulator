        desc: ''
        memory:
          query_prompt_template: 'Yêu cầu của người dùng: {{#sys.query#}}

            Nhiệm vụ: Dựa trên Metadata hệ thống và Dữ liệu thực tế ở trên, hãy viết
            câu lệnh SQL hoàn chỉnh'
          role_prefix:
            assistant: ''
