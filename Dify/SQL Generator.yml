          w\\d_]+)', content)\n        \n        for a1, c1, a2, c2 in equal_pairs:\n\
          \            original_expr = f\"{a1}.{c1} = {a2}.{c2}\"\n            \n\
          \            t1, col1, hist1 = trace_to_physical(a1, c1, l_map)\n      \
          \      t2, col2, hist2 = trace_to_physical(a2, c2, l_map)\n            \n\
          \            if t1.startswith('dp.') and t2.startswith('dp.'):\n       \
          \         if t1 == t2: continue\n                \n                rel_key\
          \ = tuple(sorted([(t1, col1), (t2, col2)]))\n                if rel_key\
          \ in seen_keys: continue\n                seen_keys.add(rel_key)\n     \
          \           \n                t_pair = tuple(sorted([t1, t2]))\n       \
          \         if rel_key not in valid_relations:\n                    trace_details\
          \ = []\n                    for h in (hist1 + hist2):\n                \
          \        if h['real'] in cte_column_trace:\n                           \
          \ src = cte_column_trace[h['real']].get(h['col'])\n                    \
          \        if src:\n                                trace_details.append(f\"\
          \      * Tại CTE `{h['real']}`: Cột `{src[1]}` được lấy ra với tên `{h['col']}`\"\
          )\n\n                    detail_msg = \"\\n\".join(trace_details)\n    \
          \                if detail_msg: detail_msg = \"   + Chi tiết truy vết:\\\
          n\" + detail_msg\n\n                    if t_pair in table_to_allowed_relations:\n\
          \                        sug = \" HOẶC \".join(table_to_allowed_relations[t_pair])\n\
          \                        warnings.append(\n                            f\"\
          [LỖI CỘT] Khối `{block['name']}` | Vị trí: `{original_expr}`\\n\"\n    \
          \                        f\"   + Phân tích: `{t1}` nối với `{t2}` qua `{col1}`\
          \ = `{col2}`.\\n\"\n                            f\"{detail_msg}\\n\"\n \
          \                           f\"   + Tại sao sai: Master Data yêu cầu nối\
          \ qua: {sug}.\"\n                        )\n                    else:\n\
          \                        warnings.append(\n                            f\"\
          [LIÊN KẾT LẠ] Khối `{block['name']}` | Vị trí: `{original_expr}`\\n\"\n\
          \                            f\"   + Phân tích: Phát hiện liên kết giữa\
          \ `{t1}` và `{t2}`.\\n\"\n                            f\"{detail_msg}\\\
          n\"\n                            f\"   + Tại sao sai: Cặp bảng này chưa\
          \ có quy tắc liên kết chuẩn.\"\n                        )\n\n    # 2.7.\
          \ Xuất báo cáo Warning\n    report = []\n    if warnings:\n        report.append(\"\
          === PHÂN TÍCH CHI TIẾT LỖI LIÊN KẾT (JOIN) ===\")\n        report.extend(warnings)\n\
          \    else:\n        report.append(\"Không phát hiện sai sót dữ liệu liên\
          \ kết quan hệ (JOIN).\")\n        \n    output[\"warning_relationship\"\
          ] = \"\\n\\n\".join(report)\n    return output"
