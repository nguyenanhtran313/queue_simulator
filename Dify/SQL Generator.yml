    - data:
        code: "import json\nimport re\n\ndef main(selected_facts_json: str, all_schema_json:\
          \ dict) -> dict:\n    # 1. Kiểm tra đầu vào null\n    if not selected_facts_json\
          \ or not all_schema_json:\n        return {\n            \"result\": \"\
          ⚠️ Error: Input data is null.\",\n            \"strict_logic_block\": \"\
          ⚠️ Error: Input data is null.\",\n            \"unique_relationships\":\
          \ \"\"\n        }\n\n    try:\n        # SỬA LỖI 1: Bóc tách layer \"data\"\
          \ nếu có trong all_schema_json\n        schema_data = all_schema_json.get(\"\
          data\", all_schema_json) if isinstance(all_schema_json, dict) else all_schema_json\n\
          \n        # 2. Parse JSON từ LLM\n        if isinstance(selected_facts_json,\
          \ dict):\n            facts_data = selected_facts_json\n        else:\n\
          \            raw_input = selected_facts_json.strip()\n            if \"\
          ```json\" in raw_input:\n                raw_input = raw_input.split(\"\
          ```json\")[1].split(\"```\")[0].strip()\n            facts_data = json.loads(raw_input)\n\
          \n        exploration_mode = facts_data.get(\"exploration_mode\", \"expand\"\
          ).lower()\n        llm_selected_facts = facts_data.get(\"selected_facts\"\
          , [])\n        llm_metrics = facts_data.get(\"metric_logic\", [])\n    \
          \    llm_joins = facts_data.get(\"relationships\", [])\n\n        # 3. Mapping\
          \ đường dẫn bảng\n        path_map = {fp.lower(): fp for fp in schema_data.keys()}\n\
          \        for fp in schema_data.keys():\n            path_map[fp.split('.')[-1].lower()]\
          \ = fp\n\n        # --- HELPER: LOGIC TÌM CỘT THỰC TẾ ---\n        def find_actual_column(table_path,\
          \ target_col_name):\n            table_info = schema_data.get(table_path)\n\
          \            if not table_info: return None\n            \n            if\
          \ '.' in target_col_name:\n                target_col_name = target_col_name.split('.')[-1]\n\
          \                \n            target_clean = target_col_name.lower().strip()\n\
          \            all_cols = table_info.get('columns', [])\n            for c\
          \ in all_cols:\n                actual_name = c.split(':')[0].strip().lower()\n\
          \                if actual_name == target_clean: return actual_name\n  \
          \          for c in all_cols:\n                if target_clean in c.lower():\
          \ return c.split(':')[0].strip().lower()\n            return None\n\n  \
          \      # 4. Thu thập các cột \"STRICT\" cho FACT tables\n        required_cols_map\
          \ = {} \n        for f in llm_selected_facts:\n            fp = path_map.get(f.get(\"\
          table_name\", \"\").lower())\n            if fp:\n                for col_req\
          \ in f.get(\"relevant_columns\", []):\n                    actual = find_actual_column(fp,\
          \ col_req)\n                    if actual: required_cols_map.setdefault(fp,\
          \ set()).add(actual)\n\n        sql_keywords = {'sum', 'count', 'distinct',\
          \ 'avg', 'min', 'max', 'case', 'when', 'then', 'else', 'end', 'and', 'or',\
          \ 'in'}\n        for m in llm_metrics:\n            fp = path_map.get(m.get(\"\
          source_table\", \"\").lower())\n            if fp:\n                potential_cols\
          \ = re.findall(r'\\b[a-z_0-9\\.]+\\b', m.get(\"column_expression\", \"\"\
          ).lower())\n                for c_req in potential_cols:\n             \
          \       if c_req not in sql_keywords and not c_req.replace('.', '').isdigit():\n\
          \                        actual = find_actual_column(fp, c_req)\n      \
          \                  if actual: required_cols_map.setdefault(fp, set()).add(actual)\n\
          \n        for r in llm_joins:\n            join_matches = re.findall(r'([a-z0-9_\\\
          .]+)\\.([a-z0-9_]+)', r.get(\"join_on\", \"\").lower())\n            for\
          \ t_path, c_name in join_matches:\n                fp = path_map.get(t_path)\
          \ or path_map.get(t_path.split('.')[-1])\n                if fp:\n     \
          \               actual = find_actual_column(fp, c_name)\n              \
          \      if actual: required_cols_map.setdefault(fp, set()).add(actual)\n\n\
          \        # 5. BFS TRUY VẾT BẢNG\n        initial_tables = set()\n      \
          \  for f in llm_selected_facts:\n            name = f.get(\"table_name\"\
          , \"\").strip().lower()\n            if name: initial_tables.add(name)\n\
          \        for rel in llm_joins:\n            if rel.get(\"source_table\"\
          ): initial_tables.add(rel[\"source_table\"].lower())\n            if rel.get(\"\
          target_table\"): initial_tables.add(rel[\"target_table\"].lower())\n\n \
          \       queue = list(initial_tables)\n        relevant_full_paths = {}\n\
          \        visited_paths = set()\n        while queue:\n            curr =\
          \ queue.pop(0)\n            fp = path_map.get(curr) or path_map.get(curr.split('.')[-1])\n\
          \            if not fp or fp in visited_paths: continue\n            visited_paths.add(fp)\n\
          \            info = schema_data[fp]\n            relevant_full_paths[fp]\
          \ = info\n            for r_str in info.get(\"relationships\", []):\n  \
          \              if \"->\" in r_str:\n                    target_full = r_str.split(\"\
          ->\")[1].split(\"|\")[0].strip()\n                    target_table_path\
          \ = \".\".join(target_full.split(\".\")[:-1])\n                    t_name_short\
          \ = target_table_path.split('.')[-1].lower()\n                    if t_name_short\
          \ in path_map: queue.append(t_name_short)\n\n        # 6. XỬ LÝ strict_logic_block\
          \ & ĐỒNG THỜI TRÍCH XUẤT UNIQUE RELATIONSHIPS CHI TIẾT CỘT\n        strict_logic_lines\
          \ = [\"## \U0001F4CC REQUIRED JOIN LOGIC (STRICT)\"]\n        join_level_warnings\
          \ = []\n        unique_relationships_set = set() \n\n        for current_table_path,\
          \ table_info in relevant_full_paths.items():\n            for r in table_info.get('relationships',\
          \ []):\n                if \"->\" in r:\n                    try:\n    \
          \                    # Tách lấy phần logic join trước ký tự ghi chú '|'\
          \ (nếu có)\n                        join_def = r.split(\"|\")[0].strip()\n\
          \                        source_col = join_def.split(\"->\")[0].strip()\n\
          \                        target_full_path_with_col = join_def.split(\"->\"\
          )[1].strip()\n                        \n                        # Bóc tách\
          \ tên cột đích và cụm tên bảng đích ban đầu\n                        parts\
          \ = target_full_path_with_col.split(\".\")\n                        target_col\
          \ = parts[-1]\n                        target_table_raw = \".\".join(parts[:-1])\n\
          \                        \n                        # Chuẩn hóa tên bảng\
          \ đích qua path_map\n                        matched_target_table_path =\
          \ path_map.get(target_table_raw.lower()) or path_map.get(target_table_raw.split('.')[-1].lower())\n\
          \                        final_target_table = matched_target_table_path\
          \ if matched_target_table_path else target_table_raw\n                 \
          \       \n                        # Tạo format chi tiết: - bang_goc.cot_goc\
          \ -> bang_dich.cot_dich\n                        unique_relationships_set.add(f\"\
          - {current_table_path}.{source_col} -> {final_target_table}.{target_col}\"\
          )\n                        \n                        # Xử lý cảnh báo level\
          \ join (CTE)\n                        if \"ghi chú: lưu ý\" in r.lower():\n\
          \                            warning = (f\"- ⚠️ **QUY TẮC JOIN**: Phải CTE\
          \ bảng `{current_table_path}` và bảng `{final_target_table}` \"\n      \
          \                                 f\"về cùng level `{target_col}` (GROUP\
