    - data:
        code: "def main(metrics: list, dimensions: list) -> dict:\n    \"\"\"\n  \
          \  Logic:\n    - Nếu metrics rỗng (empty) -> lấy dimensions để xử lý.\n\
          \    - Nếu metrics có dữ liệu -> chỉ lấy metrics để xử lý.\n    \"\"\"\n\
          \n    def chunk_array(data, size=5):\n        if not data or not isinstance(data,\
          \ list):\n            return []\n        # Loại bỏ null/rỗng\n        clean_data\
          \ = [str(x).strip() for x in data if x]\n        \n        result = []\n\
          \        for i in range(0, len(clean_data), size):\n            chunk =\
          \ clean_data[i:i + size]\n            result.append(\", \".join(chunk))\n\
          \        return result\n\n    iteration_tasks = []\n    \n    # 1. Xác định\
          \ tập dữ liệu mục tiêu dựa trên logic yêu cầu\n    # Nếu metrics không rỗng\
          \ thì chọn metrics, ngược lại chọn dimensions\n    if metrics and len(metrics)\
          \ > 0:\n        target_data = metrics\n        task_type = \"fact\"    \
          \  # Loại là fact khi xử lý metrics\n    else:\n        target_data = dimensions\n\
          \        task_type = \"dimension\" # Loại là dimension khi xử lý dims\n\n\
          \    # 2. Gom nhóm dữ liệu đã chọn (mỗi nhóm tối đa 5 phần tử)\n    chunks\
          \ = chunk_array(target_data, 5)\n\n    # 3. Tạo danh sách task cho Node\
          \ Iteration\n    for q in chunks:\n        iteration_tasks.append({\n  \
          \          \"type\": task_type,\n            \"query\": q\n        })\n\n\
          \    # Trả về biến 'tasks' cho node tiếp theo\n    return {\n        \"\
          tasks\": iteration_tasks\n    }"
