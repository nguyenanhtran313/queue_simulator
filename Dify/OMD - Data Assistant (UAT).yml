    - data:
        code: "import csv\nimport io\n\ndef main(measure_name: str, measure_count:\
          \ int) -> dict:\n    # Cover lỗi trong measure name có phẩy\n    measure_list\
          \ = next(\n        csv.reader(io.StringIO(measure_name), skipinitialspace=True,\
          \ quotechar=\"'\")\n    )\n    measure_list = sorted(measure_list, key=lambda\
          \ x: (len(x), x.lower()))\n\n    limit = 10\n    measure_list = measure_list[:limit]\n\
          \    if measure_count > limit:\n        padding = \"...\"\n    else:\n \
          \       padding = \"\"\n\n    chunk_size = 10\n    chunks = [measure_list[i:i+chunk_size]\
          \ for i in range(0, len(measure_list), chunk_size)]\n\n    measure_name_formatted\
          \ = []\n    for idx, chunk in enumerate(chunks, 1):\n        bulleted =\
          \ \"\\n\".join([f\"- {m}\" for m in chunk])\n        measure_name_formatted.append(bulleted)\n\
          \n    return {\n        \"measure_name_formatted\": measure_name_formatted,\n\
          \        \"limit\": limit,\n        \"padding\": padding\n    }"
        code_language: python3
        desc: ''
        outputs:
          limit:
            children: null
            type: number
          measure_name_formatted:
            children: null
            type: array[string]
          padding:
            children: null
            type: string
