    - data:
        code: "def main(text: str) -> dict:\n    data = json.loads(text)\n    \n \
          \   report_parts = []\n    report_parts.append(\"\\n\")\n\n    for measure\
          \ in data.get(\"measures\", []):\n        measure_name = measure.get(\"\
          measure_name\", \"\")\n        measure_alias = measure.get(\"measure_alias\"\
          , \"\")\n        description = measure.get(\"description\", \"\")\n    \
          \    expression = measure.get(\"expression\", \"\")\n        \n        #\
          \ Header\n        report_parts.append(f\"**Measures Name:** {measure_name}\"\
          )\n        report_parts.append(f\"**Measures Alias:** {measure_alias}\"\
          )\n        report_parts.append(f\"**Description:**\\n{description}\")\n\
          \        report_parts.append(f\"**Expression:**\\n```\\n{expression}\\n```\\\
          n\")\n\n        # Table header\n        table = []\n        table.append(\"\
          Step | Task | R (Responsible) | A (Accountable) | C (Consulted) | I (Informed)\"\
          )\n        table.append(\"--- | --- | --- | --- | --- | ---\")\n\n     \
          \   # Sort tasks\n        tasks = sorted(measure.get(\"tasks\", []), key=lambda\
          \ x: x.get(\"task_step\") or \"\")\n\n        for task in tasks:\n     \
          \       task_step = task.get(\"task_step\", \"\")\n            task_name\
          \ = task.get(\"task_name\", \"\")\n            raci = task.get(\"RACI\"\
          , {})\n            r = raci.get(\"Responsible\", \"\")\n            a =\
          \ raci.get(\"Accountable\", \"\")\n            c = raci.get(\"Consulted\"\
          , \"\")\n            i = raci.get(\"Informed\", \"\")\n            table.append(f\"\
          {task_step} | {task_name} | {r} | {a} | {c} | {i}\")\n\n        report_parts.append(\"\
          \\n\".join(table))\n        report_parts.append(\"\\n---\\n\")\n\n    #\
          \ Return result\n    return {\n        \"result\": \"\\n\".join(report_parts)\n\
          \        }\n"
        code_language: python3
