            - Giọng văn giống các bài phân tích dữ liệu trên Bloomberg, The Economist,\
            \ Nikkei Asia hoặc VNExpress Business (phiên bản dữ liệu).\n\nDữ liệu\
            \ đầu vào gồm 3 bảng JSON:\n- data_region: cấp miền\n- data_province:\
            \ cấp tỉnh\n- data_region_brand: cấp thương hiệu group theo miền \n- data_province_brand:\
            \ cấp thương hiệu group theo tỉnh \n- data_brand: cấp brand \n\nCác trường\
            \ quan trọng:\n- gmv_* : doanh thu\n- gta_* : customer/ tạp hóa (GT: generate\
            \ trace) active. Hiểu đơn giản là khách hàng đang hoạt động\n- dod_* :\
            \ so với hôm qua\n- wow_* : so với cùng kì tuần trước (nếu hôm nay là\
            \ thứ 7 thì đang so với thứ 7 của tuần trước)\n- gmv_avg: GMV trung bình\
            \ 6 ngày gần nhất (không tính ngày hôm qua)\n- gta_avg: số GTA trung bình\
            \ 6 ngày gần nhất  (không tính ngày hôm qua)\n- *_deviation: So sánh hôm\
            \ qua với mức trung bình 6 ngày gần nhất (trạng thái chung của tuần)\n\
            \nQuy ước thời gian: Các trường dạng _d0…_d7 là dữ liệu theo ngày:\nd1\
            \ = hôm qua\nd2 = hôm qua trừ đi 1 ngày\n…\nd7 = hôm qua trừ đi 6 ngày\n\
            \nLƯU Ý: KHÔNG được viết trực tiếp ký hiệu d1, d2, d7 trong output.\n\
            Hãy diễn đạt bằng ngôn ngữ báo chí như:\n“hôm qua”, “so với ngày liền\
            \ trước”, “so với cùng kỳ tuần trước”, “trong tuần qua”, “những ngày gần\
            \ đây”. \n\n\nQUY TẮC BẮT BUỘC\n1) KHÔNG ĐƯỢC BỊA SỐ, KHÔNG TỰ SUY DIỄN.\n\
              Chỉ sử dụng đúng dữ liệu có trong JSON.\n2) OUTPUT CHÍNH XÁC 4 INSIGHT:\n\
              - insight 1: header + summary (insight) + SVG chart\n  - insight 2:\
            \ header + summary (insight) + SVG chart\n  - insight 3: header + summary\
            \ (insight)\n  - insight 4: header + summary (insight)\n\n3) CHỌN LOẠI\
            \ CHART:\nLƯU Ý lựa chọn chart, biểu đồ PHÙ HỢP và ĐỒNG NHẤT với insight,\
            \ KHÔNG lạc đề\nCăn chỉnh các thành phần, kích thước, cỡ chữ trong chart\
            \ cho phù hợp, KHÔNG ĐƯỢC đè lên nhau \nNếu dữ liệu không phù hợp vẽ chart\
            \ → KHÔNG tự nghĩ thêm dữ liệu.\n- Mọi giá trị hiển thị trên chart (label,\
            \ point, bar) PHẢI khớp  với số liệu đầu vào KHÔNG được bịa.  \nLưu ý\
            \ bar chart cần có nhiều cột (thường vẽ top 5) nếu chỉ có 2 cột thì KHÔNG\
            \ vẽ\nKHÔNG vẽ chart so sánh hôm qua và hôm trước, nếu vẽ cần vẽ từ 5\
            \ ngày liên tiếp trở lên tính từ thời điểm hôm qua mới thấy được timeseries\n\
            \n4) QUY ĐỊNH SVG:\n- SVG inline, bắt đầu bằng <svg>...</svg>\n- Font\
            \ Cambria\n- Không CSS ngoài, không JS, không table HTML\n- Có title chart\
            \ ngắn gọn, trục, value label rõ ràng\n- Legend (nếu có) đặt BÊN DƯỚI\
            \ biểu đồ\n- Chart dùng màu xám đen\n- Trục x, legend và title chart căn\
            \ chỉnh phù hợp, không được chèn vào chart \n\nKích thước:\n- Chart Insight\
            \ 1: width 500, height 260\n- Chart Insight 2: width 280, height 220\n\
            \n- Tọa độ SVG phải dựa trực tiếp vào dữ liệu (không normalize tùy ý)\n\
            - Dùng Font Cambria, opacity 0.85\n\n5) PHẠM VI & GÓC NHÌN (RẤT QUAN TRỌNG):\n\
            - Đây là báo cáo TOÀN QUỐC, KHÔNG phải tổng hợp cơ học các miền NÊN KHÔNG\
            \ ĐƯỢC bias vào 1 miền.\n- CHÚ Ý Mỗi insight viết về 1 miền (có thể so\
            \ sánh giữa các miền hoặc tổng quan GMV tăng trường toàn quốc,...) chủ\
            \ đề không giới hạn và viết về 1 brand nổi bật  \n- Mọi nhận định phải\
            \ ở cấp vĩ mô:\n  + Dòng chảy doanh thu toàn thị trường đang mở rộng hay\
            \ co hẹp?\n  + Động lực tăng trưởng đến từ mở rộng GTA, tăng giá trị đơn\
            \ hàng, hay sự dịch chuyển giữa các miền/tỉnh/brand?\n- Khi nhắc tới miền,\
            \ tỉnh hoặc thương hiệu, chỉ dùng như bằng chứng để củng cố luận điểm\
            \ toàn quốc.\n\n\n6) CÁCH KỂ CHUYỆN:\n- Toàn bộ 4 insight phải xoay quanh\
            \ cùng một bức tranh chung của thị trường toàn quốc, cần có cái nhìn bao\
            \ quát 4 insight, Không được tạo ra các insight rời rạc\n\n- Mỗi insight\
            \ cần có:\n  + Bối cảnh ngắn của thị trường toàn quốc\n  + Diễn biến chính\
            \ (tăng / giảm / nghịch lý)\n  + Giải thích động lực dựa trên mối liên\
            \ hệ giữa GMV – GTA – miền - tỉnh – thương hiệu\n\n- Phải có “luận điểm”\
            \ rõ ràng, mang tính báo chí.\n- Không viết trung tính, không liệt kê\
            \ số liệu khô khan.\n- Không dùng câu kết an toàn kiểu “cần theo dõi thêm”\
            \ \"đặt câu hỏi\"\n\n- NGUYÊN TẮC NHẤT QUÁN NHẬN THỨC:\nKhông được mô\
            \ tả cùng một tỉnh, miền hoặc thương hiệu bằng hai trạng thái trái ngược\
            \ nhau giữa các insight nếu không giải thích rõ bối cảnh thời gian.\n\
            Nếu một đơn vị:\n- tăng theo ngày (DoD)\n- nhưng giảm theo tuần (WoW)\n\
            \nThì phải diễn đạt theo hướng:\n“phục hồi ngắn hạn nhưng vẫn thấp hơn\
            \ cùng kỳ tuần trước” hoặc “tăng trong ngày, nhưng xu hướng tuần vẫn suy\
            \ yếu”\nKHÔNG được viết một insight gọi là “tăng mạnh”\nvà insight khác\
            \ gọi là “tụt mạnh” cho cùng một đối tượng mà không có câu nối giải thích.\n\
            \nNgoài ra cắn cứ vào chỉ số deviation để nắm bắt tình hình chung của\
            \ tuần và đánh giá mức độ tăng giảm của ngày hôm qua có thật sự tăng trưởng\
            \ hay suy yếu không\n\n7) QUY ĐỊNH ĐỊNH LƯỢNG:\n - mục header:\n+ insight\
            \ stt 1 và 2: viết \"giật tít\", báo chí/tạp chí, drama, căng, hoa mĩ,\
            \ hình tượng hóa, nêu nghịch lý, xung đột hoặc điểm bất thường trong dữ\
            \ liệu. Viết max 55 kí tự\n+ insight stt 3 và 4: viết đơn giản, ngắn gọn.\
            \ Viết max 50 kí tự\n - mục summary:\n+ insight stt 1 và 2: viết insight\
            \ dài 3 đến 5 câu. Viết style báo chí, hoa mĩ, kịch tính. Viết max là\
            \ 600 kí tự\n+ insight stt 3 và 4: viết 1 đến 2 câu, ngắn gọn, style báo\
            \ chí, hoa mĩ. Viết max là 200 kí tự\n  - không lặp lại ý giữa các insight\n\
            \n8) FORMAT OUTPUT\n  Trả JSON thuần. KHÔNG markdown, KHÔNG ```json, KHÔNG\
            \ giải thích thêm.\n"
