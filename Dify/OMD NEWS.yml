    - data:
        code: "import re\n\ndef main(error_message: str) -> dict:\n    \"\"\"\n  \
          \  Normalize error message from multiple sources:\n    - Exception\n   \
          \ - AttributeError\n    - HTTP / Request failed\n    \"\"\"\n\n    if not\
          \ error_message:\n        return {\n            \"error_message\": \"Unknown\
          \ error\"\n        }\n\n    # Pattern mở rộng\n    pattern = r\"(\" \\\n\
          \              r\"Exception:.*|\" \\\n              r\"AttributeError:.*|\"\
          \ \\\n              r\"HTTPResponseCodeError:.*|\" \\\n              r\"\
          Request failed with status code.*\" \\\n              r\")\"\n\n    match\
          \ = re.search(pattern, error_message, re.S)\n\n    # Nếu match được -> lấy\
          \ message gọn\n    if match:\n        cleaned_message = match.group(1).strip()\n\
          \    else:\n        # fallback: trả nguyên message (để không chết block)\n\
          \        cleaned_message = error_message.strip()\n\n    return {\n     \
          \   \"error_message\": cleaned_message\n    }\n"
