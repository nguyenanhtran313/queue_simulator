<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Queue Simulator</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: {
                            bg: '#f5f5f7',
                            card: 'rgba(255, 255, 255, 0.7)',
                            text: '#1d1d1f',
                            subtext: '#86868b',
                            blue: '#0071e3',
                            red: '#ff3b30',
                            green: '#34c759',
                            orange: '#ff9500'
                        }
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0, 0, 0, 0.04)',
                        'apple-hover': '0 8px 32px rgba(0, 0, 0, 0.08)'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #f5f5f7; color: #1d1d1f; -webkit-font-smoothing: antialiased; margin: 0; overflow: hidden; }
        .glass { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
        }
        .apple-slider { 
            -webkit-appearance: none; width: 100%; height: 4px; border-radius: 4px; background: #e5e5ea; outline: none; 
        }
        .apple-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; 
            background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15); cursor: pointer; border: 1px solid #e5e5ea;
        }
        .editable-title {
            background: transparent; border: none; outline: none; font-weight: 600; width: 100%;
            transition: background 0.2s; border-radius: 6px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
        }
        .editable-title:hover, .editable-title:focus {
            background: rgba(0,0,0,0.05); padding: 0 4px;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #aeaeb2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const APPLE_COLORS = ['#007aff', '#ff9500', '#ff2d55', '#af52de', '#5ac8fa', '#34c759', '#ffcc00', '#ff3b30', '#5856d6', '#8e8e93'];

        // Custom Hook to manage dynamic Chart.js instance (Now horizontal layout at bottom)
        const useChart = (history, nodes) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartRef.current && !chartInstance.current) {
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: history.labels,
                            datasets: []
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false,
                            scales: {
                                y: { beginAtZero: true, max: 150, grid: { color: '#e5e5ea' }, ticks: { font: {size: 10} } },
                                x: { grid: { display: false }, ticks: { font: {size: 9}, color: '#86868b' } }
                            },
                            plugins: { 
                                legend: { 
                                    position: 'bottom', // Legend at bottom for better horizontal flow
                                    labels: { color: '#86868b', usePointStyle: true, boxWidth: 6, font: {size: 10}, padding: 8 } 
                                }
                            },
                            layout: {
                                padding: { left: 10, right: 10, top: 0, bottom: 0 }
                            },
                            elements: {
                                line: { tension: 0.4, borderWidth: 1.5 },
                                point: { radius: 0 }
                            }
                        }
                    });
                }
            }, []);

            useEffect(() => {
                if (chartInstance.current) {
                    const datasets = nodes.map((node, i) => ({
                        label: node.name,
                        data: history.data[node.id] || Array(30).fill(0),
                        borderColor: APPLE_COLORS[i % APPLE_COLORS.length],
                        backgroundColor: APPLE_COLORS[i % APPLE_COLORS.length]
                    }));

                    datasets.push({
                        label: 'Quá Tải (100%)',
                        data: Array(30).fill(100),
                        borderColor: '#ff3b30',
                        borderDash: [4, 4],
                        borderWidth: 1,
                        pointRadius: 0
                    });

                    chartInstance.current.data.labels = history.labels;
                    chartInstance.current.data.datasets = datasets;
                    chartInstance.current.update();
                }
            }, [history, nodes]);

            return chartRef;
        };

        const App = () => {
            // State
            const [baseArrivalRate, setBaseArrivalRate] = useState(20);
            const [scenario, setScenario] = useState('normal'); // 'low', 'normal', 'high'
            const [nodes, setNodes] = useState([
                { id: Date.now() + 1, name: 'Order (Đặt món)', servers: 3, processTime: 1 },
                { id: Date.now() + 2, name: 'Bếp (Nấu ăn)', servers: 5, processTime: 2 },
                { id: Date.now() + 3, name: 'Trả món', servers: 2, processTime: 0.5 },
            ]);

            // Calculate Effective Arrival Rate based on scenario
            const arrivalRate = useMemo(() => {
                if (scenario === 'low') return baseArrivalRate * 0.5;
                if (scenario === 'high') return baseArrivalRate * 2;
                return baseArrivalRate;
            }, [baseArrivalRate, scenario]);

            // History for chart
            const [history, setHistory] = useState({
                labels: Array(30).fill(''),
                data: {}
            });

            // Math Calculation Engine
            const metrics = useMemo(() => {
                let currentIncoming = arrivalRate;
                const results = nodes.map(node => {
                    const capacity = node.servers * (1 / node.processTime); 
                    const rho = capacity > 0 ? currentIncoming / capacity : 0;
                    const isBottleneck = rho >= 1;
                    const queueGrowth = isBottleneck ? (currentIncoming - capacity).toFixed(1) : 0;
                    const outputRate = Math.min(currentIncoming, capacity);
                    
                    let estimatedQueue = 0;
                    let waitTimeStr = '0s';
                    if (rho < 1 && rho > 0) {
                        estimatedQueue = Math.pow(rho, Math.sqrt(2 * (node.servers + 1))) / (1 - rho);
                        const waitTimeMin = currentIncoming > 0 ? (estimatedQueue / currentIncoming) : 0;
                        if (waitTimeMin < 1) {
                            waitTimeStr = `${Math.round(waitTimeMin * 60)}s`;
                        } else {
                            waitTimeStr = `${waitTimeMin.toFixed(1)}m`;
                        }
                    } else if (isBottleneck) {
                        waitTimeStr = 'Tăng vô hạn';
                    }

                    const result = {
                        ...node,
                        incoming: currentIncoming,
                        capacity,
                        rho,
                        isBottleneck,
                        queueGrowth,
                        estimatedQueue: isBottleneck ? 'Tăng vô hạn' : Math.round(estimatedQueue),
                        waitTimeStr,
                        outputRate
                    };
                    
                    currentIncoming = outputRate;
                    return result;
                });
                return results;
            }, [arrivalRate, nodes]);

            // Tick Update Chart History
            useEffect(() => {
                const timer = setInterval(() => {
                    setHistory(prev => {
                        const newLabels = [...prev.labels.slice(1), new Date().toLocaleTimeString('en-US', {hour12: false, minute:'2-digit', second:'2-digit'})];
                        const newData = { ...prev.data };
                        
                        metrics.forEach(m => {
                            if (!newData[m.id]) newData[m.id] = Array(30).fill(0);
                            newData[m.id] = [...newData[m.id].slice(1), m.rho * 100];
                        });
                        
                        return { labels: newLabels, data: newData };
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [metrics]);

            const chartRef = useChart(history, nodes);

            // Node Operations
            const addNode = () => {
                if (nodes.length >= 10) return;
                setNodes([...nodes, { id: Date.now(), name: `Bước ${nodes.length + 1}`, servers: 1, processTime: 1 }]);
            };

            const removeNode = (id) => {
                if (nodes.length <= 1) return; // Keep at least one node
                setNodes(nodes.filter(n => n.id !== id));
            };

            const updateNode = (id, field, value) => {
                setNodes(nodes.map(n => n.id === id ? { ...n, [field]: value } : n));
            };

            // Preset McDonald's Template (9 Steps)
            const loadMcDonaldsTemplate = () => {
                const baseId = Date.now();
                const mcdonaldsNodes = [
                    { id: baseId + 1, name: '1. Gửi xe', servers: 15, processTime: 0.5 },
                    { id: baseId + 2, name: '2. Xếp hàng Kiosk', servers: 2, processTime: 0.8 },
                    { id: baseId + 3, name: '3. Order nước/kem', servers: 3, processTime: 1.2 },
                    { id: baseId + 4, name: '4. Thanh toán quầy', servers: 2, processTime: 0.8 },
                    { id: baseId + 5, name: '5. Chờ nhận bill', servers: 3, processTime: 0.3 },
                    { id: baseId + 6, name: '6. Bếp nướng thịt', servers: 5, processTime: 2.0 },
                    { id: baseId + 7, name: '7. Bếp ráp Burger', servers: 4, processTime: 1.2 },
                    { id: baseId + 8, name: '8. Đóng gói túi', servers: 3, processTime: 0.6 },
                    { id: baseId + 9, name: '9. Quầy Trả món', servers: 2, processTime: 0.5 },
                ];
                setNodes(mcdonaldsNodes);
                setBaseArrivalRate(20);
                setScenario('normal');
            };

            return (
                <div className="h-screen w-full flex p-4 gap-4 bg-apple-bg overflow-hidden">
                    
                    {/* LEFT COLUMN - Sidebar (25%) */}
                    <div className="w-[24%] min-w-[260px] max-w-[320px] flex flex-col gap-3 h-full shrink-0">
                        
                        {/* Header */}
                        <div className="glass rounded-[24px] p-4 shadow-apple text-center shrink-0">
                            <h1 className="text-xl font-semibold tracking-tight text-apple-text">Queue Simulator</h1>
                            <p className="text-[10px] text-apple-subtext mt-0.5 font-medium uppercase tracking-wider">Universal Math Engine</p>
                        </div>

                        {/* Master Arrival Control */}
                        <div className="glass rounded-[24px] p-4 shadow-apple flex flex-col items-center shrink-0">
                            <h2 className="text-[12px] font-semibold text-apple-text mb-0.5">Nguồn Khách Ban Đầu</h2>
                            <p className="text-[10px] text-apple-subtext mb-3">Base Arrival Rate (người/phút)</p>
                            
                            <div className="text-3xl font-semibold tracking-tight text-apple-blue mb-3">
                                {Math.round(baseArrivalRate)}
                            </div>
                            
                            <div className="flex items-center gap-3 w-full px-2 mb-2">
                                <span className="text-apple-subtext text-[10px]">Ít</span>
                                <input type="range" min="1" max="100" value={baseArrivalRate} onChange={(e) => setBaseArrivalRate(Number(e.target.value))} className="apple-slider flex-1" />
                                <span className="text-apple-subtext text-[10px]">Nhiều</span>
                            </div>
                        </div>

                        {/* Scenarios Selection */}
                        <div className="glass rounded-[24px] p-4 shadow-apple flex flex-col shrink-0">
                            <h3 className="text-xs font-semibold text-apple-text mb-3">Kịch Bản Lưu Lượng</h3>
                            <div className="space-y-2">
                                <label className="flex items-center gap-3 text-xs text-apple-text cursor-pointer">
                                    <input type="radio" name="scenario" checked={scenario === 'low'} onChange={() => setScenario('low')} className="w-4 h-4 text-apple-blue focus:ring-0" />
                                    <span>Vắng khách (Chia đôi)</span>
                                </label>
                                <label className="flex items-center gap-3 text-xs text-apple-text cursor-pointer">
                                    <input type="radio" name="scenario" checked={scenario === 'normal'} onChange={() => setScenario('normal')} className="w-4 h-4 text-apple-blue focus:ring-0" />
                                    <span>Trung bình (Giữ nguyên)</span>
                                </label>
                                <label className="flex items-center gap-3 text-xs text-apple-text cursor-pointer">
                                    <input type="radio" name="scenario" checked={scenario === 'high'} onChange={() => setScenario('high')} className="w-4 h-4 text-apple-blue focus:ring-0" />
                                    <span>Đông khách (Nhân đôi)</span>
                                </label>
                            </div>
                            <div className="mt-3 pt-3 border-t border-black/5 text-center text-xs font-medium text-apple-orange">
                                Thực tế: {arrivalRate.toFixed(1)} khách/phút
                            </div>
                        </div>

                        {/* Templates Selection */}
                        <div className="glass rounded-[24px] p-4 shadow-apple flex flex-col shrink-0">
                            <h3 className="text-xs font-semibold text-apple-text mb-3">Dữ Liệu Mẫu</h3>
                            <button 
                                onClick={loadMcDonaldsTemplate} 
                                className="w-full py-2 bg-apple-blue text-white rounded-xl text-xs font-semibold shadow-sm hover:bg-blue-600 transition-colors"
                            >
                               🍔 McDonald's Pipeline (9 Bước)
                            </button>
                        </div>

                    </div>

                    {/* RIGHT COLUMN - Main Content (75%) */}
                    {/* Add overflow-y-auto to this container so the chart scrolls with the steps and sits directly below them */}
                    {/* min-w-0 prevents this flex-1 child from overflowing the screen width */}
                    <div className="flex-1 h-full overflow-y-auto pr-2 pb-4 min-w-0">
                        
                        {/* Nodes Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 content-start">
                            
                            {metrics.map((metric, i) => (
                                <div key={metric.id} className="glass rounded-[20px] p-3 shadow-apple hover:shadow-apple-hover transition-shadow relative flex flex-col group min-h-[170px] min-w-0">
                                    
                                    {/* Delete Button */}
                                    <button onClick={() => removeNode(metric.id)} className="absolute top-2 right-2 w-5 h-5 rounded-full bg-black/5 hover:bg-black/10 text-apple-subtext flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                    </button>

                                    {/* Editable Title */}
                                    <input 
                                        type="text" 
                                        value={metric.name} 
                                        onChange={(e) => updateNode(metric.id, 'name', e.target.value)} 
                                        className="editable-title text-sm mb-2 text-apple-text pr-5 font-bold"
                                    />
                                    
                                    {/* Status Indicator */}
                                    <div className="flex justify-between items-end mb-1">
                                        <span className="text-[9px] font-medium text-apple-subtext uppercase">Mức tải</span>
                                        <span className={`text-xs font-semibold ${metric.isBottleneck ? 'text-apple-red' : 'text-apple-green'}`}>
                                            {(metric.rho * 100).toFixed(0)}%
                                        </span>
                                    </div>
                                    <div className="w-full bg-black/5 h-1 rounded-full mb-3 overflow-hidden">
                                        <div 
                                            className={`h-full rounded-full transition-all duration-500 ${metric.isBottleneck ? 'bg-apple-red' : 'bg-apple-green'}`}
                                            style={{ width: `${Math.min(metric.rho * 100, 100)}%` }}
                                        ></div>
                                    </div>

                                    {/* Node Config Sliders */}
                                    <div className="space-y-2 mb-3">
                                        <div>
                                            <div className="flex justify-between text-[9px] mb-0.5">
                                                <span className="text-apple-subtext">Nhân sự/Quầy</span>
                                                <span className="font-semibold text-[10px]">{metric.servers}</span>
                                            </div>
                                            <input type="range" min="1" max="20" value={metric.servers} onChange={(e) => updateNode(metric.id, 'servers', Number(e.target.value))} className="apple-slider" />
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-[9px] mb-0.5">
                                                <span className="text-apple-subtext">Tốc độ (p/khách)</span>
                                                <span className="font-semibold text-[10px]">{metric.processTime}</span>
                                            </div>
                                            <input type="range" min="0.1" max="5" step="0.1" value={metric.processTime} onChange={(e) => updateNode(metric.id, 'processTime', Number(e.target.value))} className="apple-slider" />
                                        </div>
                                    </div>

                                    {/* Waiting Time & Stats */}
                                    <div className="mt-auto pt-2 border-t border-black/5 flex flex-col gap-1">
                                        <div className="flex justify-between text-[9px]">
                                            <span className="text-apple-subtext">Đợi trung bình:</span>
                                            <span className={`font-semibold ${metric.isBottleneck ? 'text-apple-red' : 'text-apple-text'}`}>{metric.waitTimeStr}</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-1 text-center pt-1 border-t border-black/[0.02]">
                                            <div>
                                                <div className="text-[8px] text-apple-subtext uppercase">Đến</div>
                                                <div className="font-medium text-[10px]">{metric.incoming.toFixed(1)}/m</div>
                                            </div>
                                            <div>
                                                <div className="text-[8px] text-apple-subtext uppercase">Xử lý</div>
                                                <div className="font-medium text-[10px]">{metric.capacity.toFixed(1)}/m</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Warning Overlay */}
                                    {metric.isBottleneck && (
                                        <div className="absolute -bottom-1.5 left-1/2 -translate-x-1/2 bg-apple-red text-white text-[8px] font-bold px-2 py-0.5 rounded-full shadow-lg whitespace-nowrap z-10 border border-white/20">
                                            QUÁ TẢI (+{metric.queueGrowth})
                                        </div>
                                    )}
                                </div>
                            ))}

                            {/* Add Button */}
                            {nodes.length < 10 && (
                                <button 
                                    onClick={addNode} 
                                    className="glass rounded-[20px] p-3 shadow-apple hover:shadow-apple-hover transition-all flex flex-col items-center justify-center min-h-[170px] text-apple-subtext hover:text-apple-blue group cursor-pointer border-dashed border border-black/10 hover:border-apple-blue/30 bg-transparent hover:bg-apple-blue/5"
                                >
                                    <div className="w-8 h-8 rounded-full bg-black/5 group-hover:bg-apple-blue/10 flex items-center justify-center mb-2 transition-colors">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                                    </div>
                                    <span className="font-medium text-xs">Thêm Bước</span>
                                </button>
                            )}
                        </div>

                        {/* Chart is placed here directly inside the scrollable container, immediately following the grid */}
                        <div className="glass rounded-[24px] p-4 shadow-apple h-[250px] mt-4 flex flex-col relative shrink-0">
                            <h3 className="text-xs font-semibold text-apple-text mb-2 shrink-0">Biểu đồ Mức độ tải (%) theo thời gian</h3>
                            <div className="flex-1 relative w-full h-full min-h-0">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>

                    </div>
                    
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
